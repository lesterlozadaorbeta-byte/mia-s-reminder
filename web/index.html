<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mia's Reminder - AI Personal Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0f172a;
            color: #f1f5f9;
            min-height: 100vh;
        }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; height: 100vh; display: flex; flex-direction: column; }
        
        /* Header */
        .header { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; border-bottom: 1px solid #334155; }
        .logo { display: flex; align-items: center; gap: 10px; }
        .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, #6366f1, #8b5cf6); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .logo-text { font-size: 18px; font-weight: 700; }
        .status { font-size: 12px; color: #10b981; display: flex; align-items: center; gap: 6px; }
        .status::before { content: ''; width: 8px; height: 8px; background: #10b981; border-radius: 50%; }

        /* Chat Area */
        .chat-area { flex: 1; overflow-y: auto; padding: 24px 0; display: flex; flex-direction: column; gap: 16px; }
        .message { display: flex; gap: 12px; max-width: 85%; animation: fadeIn 0.3s ease; }
        .message.user { margin-left: auto; flex-direction: row-reverse; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 14px; }
        .message.assistant .avatar { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
        .message.user .avatar { background: #334155; }
        .bubble { padding: 12px 16px; border-radius: 16px; line-height: 1.5; font-size: 14px; white-space: pre-wrap; }
        .message.assistant .bubble { background: #1e293b; border: 1px solid #334155; border-top-left-radius: 4px; }
        .message.user .bubble { background: #6366f1; border-top-right-radius: 4px; }

        /* Welcome */
        .welcome { text-align: center; padding: 60px 20px; }
        .welcome h1 { font-size: 28px; margin-bottom: 8px; }
        .welcome p { color: #94a3b8; margin-bottom: 32px; }
        .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .suggestion { background: #1e293b; border: 1px solid #334155; padding: 10px 16px; border-radius: 20px; font-size: 13px; cursor: pointer; transition: all 0.2s; }
        .suggestion:hover { border-color: #6366f1; background: #6366f120; }

        /* Input */
        .input-area { padding: 16px 0; border-top: 1px solid #334155; }
        .input-box { display: flex; gap: 8px; }
        .input-box input { flex: 1; background: #1e293b; border: 1px solid #334155; border-radius: 24px; padding: 14px 20px; color: #f1f5f9; font-size: 14px; outline: none; font-family: inherit; }
        .input-box input:focus { border-color: #6366f1; }
        .input-box input::placeholder { color: #64748b; }
        .send-btn { width: 44px; height: 44px; background: #6366f1; border: none; border-radius: 50%; color: white; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
        .send-btn:hover { background: #4f46e5; }
        .send-btn:disabled { background: #334155; cursor: not-allowed; }

        /* Typing indicator */
        .typing { display: flex; gap: 4px; padding: 12px 16px; }
        .typing span { width: 8px; height: 8px; background: #64748b; border-radius: 50%; animation: bounce 1.4s infinite; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* Auth */
        .auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
        .auth-card { background: #1e293b; border: 1px solid #334155; border-radius: 20px; padding: 40px; width: 100%; max-width: 400px; }
        .auth-card h2 { margin-bottom: 8px; font-size: 24px; }
        .auth-card p { color: #94a3b8; margin-bottom: 24px; font-size: 14px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 6px; }
        .form-group input { width: 100%; background: #0f172a; border: 1px solid #334155; border-radius: 10px; padding: 12px 16px; color: #f1f5f9; font-size: 14px; outline: none; }
        .form-group input:focus { border-color: #6366f1; }
        .pass-wrap { position: relative; }
        .pass-wrap input { padding-right: 44px; }
        .pass-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #64748b; cursor: pointer; font-size: 16px; }
        .btn { width: 100%; padding: 14px; background: #6366f1; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; }
        .btn:hover { background: #4f46e5; }
        .btn:disabled { background: #334155; }
        .auth-switch { text-align: center; margin-top: 20px; font-size: 13px; color: #94a3b8; }
        .auth-switch a { color: #6366f1; cursor: pointer; text-decoration: none; }
        .error-msg { color: #ef4444; font-size: 13px; margin-top: 8px; }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        const API_URL = 'https://mia-s-reminder-production.up.railway.app/api/v1';
        let token = localStorage.getItem('token');
        let messages = [];

        function togglePass() {
            const p = document.getElementById('password');
            const btn = event.target;
            if (p.type === 'password') { p.type = 'text'; btn.textContent = '🙈'; }
            else { p.type = 'password'; btn.textContent = '👁'; }
        }

        function render() {
            if (!token) {
                renderAuth();
            } else {
                renderChat();
            }
        }

        function renderAuth() {
            const isLogin = !window.showRegister;
            document.getElementById('app').innerHTML = `
                <div class="auth-screen">
                    <div class="auth-card">
                        <div style="text-align:center;margin-bottom:24px;">
                            <div class="logo-icon" style="margin:0 auto 12px;width:48px;height:48px;font-size:24px;">🤖</div>
                            <h2>${isLogin ? 'Welcome Back' : 'Create Account'}</h2>
                            <p>${isLogin ? 'Sign in to Mia\'s Reminder' : 'Start organizing your life with Mia'}</p>
                        </div>
                        ${!isLogin ? '<div class="form-group"><label>Full Name</label><input id="name" placeholder="Your name"></div>' : ''}
                        <div class="form-group"><label>Email</label><input id="email" type="email" placeholder="you@example.com"></div>
                        <div class="form-group"><label>Password</label><div class="pass-wrap"><input id="password" type="password" placeholder="Min 4 characters"><button type="button" class="pass-toggle" onclick="togglePass()">👁</button></div></div>
                        <div id="error" class="error-msg"></div>
                        <button class="btn" onclick="${isLogin ? 'login()' : 'register()'}">${isLogin ? 'Sign In' : 'Create Account'}</button>
                        <div class="auth-switch">
                            ${isLogin ? 'Don\'t have an account? <a onclick="window.showRegister=true;render()">Sign Up</a>' : 'Already have an account? <a onclick="window.showRegister=false;render()">Sign In</a>'}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderChat() {
            const msgHtml = messages.length === 0 ? `
                <div class="welcome">
                    <h1>Hi! I'm Mia 👋</h1>
                    <p>Your AI assistant. Tell me what you need help with.</p>
                    <div class="suggestions">
                        <div class="suggestion" onclick="sendSuggestion('Remind me to submit my assignment tomorrow at 8 AM')">⏰ Set a reminder</div>
                        <div class="suggestion" onclick="sendSuggestion('Create a study schedule for my exams')">📅 Plan my week</div>
                        <div class="suggestion" onclick="sendSuggestion('Wake me up every weekday at 6 AM')">🔔 Set an alarm</div>
                        <div class="suggestion" onclick="sendSuggestion('Create a to-do list for today')">✅ Make a to-do list</div>
                    </div>
                </div>
            ` : messages.map(m => `
                <div class="message ${m.role}">
                    <div class="avatar">${m.role === 'user' ? '👤' : '🤖'}</div>
                    <div class="bubble">${m.content}</div>
                </div>
            `).join('');

            document.getElementById('app').innerHTML = `
                <div class="container">
                    <div class="header">
                        <div class="logo">
                            <div class="logo-icon">🤖</div>
                            <span class="logo-text">Mia's Reminder</span>
                        </div>
                        <div style="display:flex;align-items:center;gap:16px;">
                            <div class="status">Online</div>
                            <button onclick="logout()" style="background:none;border:1px solid #334155;color:#94a3b8;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:12px;">Logout</button>
                        </div>
                    </div>
                    <div class="chat-area" id="chatArea">${msgHtml}</div>
                    <div class="input-area">
                        <div class="input-box">
                            <input id="msgInput" placeholder="Ask Mia anything..." onkeydown="if(event.key==='Enter')sendMessage()">
                            <button class="send-btn" onclick="sendMessage()">➤</button>
                        </div>
                    </div>
                </div>
            `;
            const chat = document.getElementById('chatArea');
            chat.scrollTop = chat.scrollHeight;
        }

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            document.getElementById('error').textContent = '';
            try {
                const res = await fetch(API_URL + '/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password})
                });
                const data = await res.json();
                if (res.ok) {
                    token = data.access_token;
                    localStorage.setItem('token', token);
                    render();
                } else {
                    document.getElementById('error').textContent = data.detail || 'Login failed';
                }
            } catch(e) { document.getElementById('error').textContent = 'Cannot connect to server. Please try again.'; console.error(e); }
        }

        async function register() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            document.getElementById('error').textContent = '';
            try {
                const res = await fetch(API_URL + '/auth/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password, full_name: name})
                });
                const data = await res.json();
                if (res.ok) {
                    token = data.access_token;
                    localStorage.setItem('token', token);
                    render();
                } else {
                    document.getElementById('error').textContent = data.detail || 'Registration failed';
                }
            } catch(e) { document.getElementById('error').textContent = 'Cannot connect to server. Please try again.'; console.error(e); }
        }

        function sendSuggestion(text) {
            document.getElementById('msgInput').value = text;
            sendMessage();
        }

        async function sendMessage() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text) return;
            input.value = '';

            messages.push({role: 'user', content: text});
            renderChat();

            // Show typing
            const chatArea = document.getElementById('chatArea');
            chatArea.innerHTML += '<div class="message assistant"><div class="avatar">🤖</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div></div>';
            chatArea.scrollTop = chatArea.scrollHeight;

            try {
                const res = await fetch(API_URL + '/chat/message', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token},
                    body: JSON.stringify({content: text})
                });
                const data = await res.json();
                if (res.ok) {
                    messages.push({role: 'assistant', content: data.message.content});
                } else if (res.status === 401 || res.status === 403) {
                    logout();
                    return;
                } else {
                    messages.push({role: 'assistant', content: 'Sorry, I encountered an error. Please try again.'});
                }
            } catch(e) {
                messages.push({role: 'assistant', content: 'Connection error. Please check your internet.'});
            }
            renderChat();
        }

        function logout() {
            token = null;
            localStorage.removeItem('token');
            messages = [];
            render();
        }

        render();
    </script>
</body>
</html>
